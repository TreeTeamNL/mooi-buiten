version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      cooldown:
        default-days: 5
    target-branch: 'main'    
    open-pull-requests-limit: 1
    assignees:
      - "allartk"
      - "Mees100"
    commit-message:
      prefix: fix
      prefix-development: chore
      include: scope